<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Cloud Data Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 40px;
      background-color: #f8fafc;
      color: #1e293b;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    .status-box {
      background-color: #f1f5f9;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      margin-bottom: 20px;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cloud Data Dashboard</h1>
    <p>Welcome to the generic Google Drive + Apps Script sync dashboard.</p>
    
    <div class="status-box" id="status">
      System Ready. Click the button to refresh data from backend.
    </div>
    
    <button onclick="refreshData()">Refresh Dashboard</button>
  </div>

  <script>
    function refreshData() {
      document.getElementById('status').innerText = 'Requesting data...';
      // Example call to Apps Script backend function
      if (typeof google !== 'undefined') {
        google.script.run
          .withSuccessHandler(function(response) {
             document.getElementById('status').innerText = 'Data Loaded: ' + JSON.stringify(response);
          })
          .withFailureHandler(function(err) {
             document.getElementById('status').innerText = 'Error: ' + err.toString();
          })
          .getInitialData(); // Replace with your Apps Script backend function name
      } else {
        setTimeout(function() {
          document.getElementById('status').innerText = 'Local Preview Mode (Mock response success)';
        }, 1000);
      }
    }
  </script>
</body>
</html>
